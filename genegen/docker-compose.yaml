# Coolify: "Docker Compose" deployments use this file (build context = genegen/).
# Must match genegen/Dockerfile (coolify-deploy.env, Clerk strip, genegen-boot).
services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        COOLIFY_NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-}
    ports:
      - "3000:3000"
    environment:
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
    restart: unless-stopped
