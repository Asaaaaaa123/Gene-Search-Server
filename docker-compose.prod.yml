# Production Docker Compose
# Usage: cp .env.example .env  →  docker compose -f docker-compose.prod.yml up -d --build

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: gene-search-backend
    ports:
      - "${BACKEND_PUBLISH_PORT:-8000}:${PORT:-8000}"
    volumes:
      - ./backend/data:/app/data:ro
      - backend-user-data:/app/user_data
    env_file:
      - path: .env
        required: true
    environment:
      PORT: ${PORT:-8000}
      WORKERS: ${WORKERS:-2}
      MONGODB_URI: ${MONGODB_URI:-}
      CLERK_ISSUER: ${CLERK_ISSUER:-}
      VALID_TOKENS: ${VALID_TOKENS:-}
    networks:
      - gene-search-network
    restart: always
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import os,urllib.request; urllib.request.urlopen('http://127.0.0.1:' + os.environ.get('PORT', '8000') + '/api/health', timeout=8)\"",
        ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 120s
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 4G
        reservations:
          cpus: "1"
          memory: 1G
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://backend:8000}
        NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}
        CLERK_PUBLISHABLE_KEY: ${CLERK_PUBLISHABLE_KEY:-}
        CLERK_SECRET_KEY: ${CLERK_SECRET_KEY}
    container_name: gene-search-frontend
    ports:
      - "${FRONTEND_PUBLISH_PORT:-3000}:3000"
    env_file:
      - path: .env
        required: true
    environment:
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
      NODE_ENV: production
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}
      CLERK_PUBLISHABLE_KEY: ${CLERK_PUBLISHABLE_KEY:-${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY}
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - gene-search-network
    restart: always
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  gene-search-network:
    driver: bridge

volumes:
  backend-user-data:
